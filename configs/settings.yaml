providers:                          # 무료 테스트 우선. openai는 후순위(유료·성능 미달 시만)
  llm: upstage                      # upstage | naver | openai
  embedding: upstage
llm:
  temperature: 0.0
  max_retries: 6  # 문제: 2였을 때 ours_g 127개 중 120개가 429로 ERROR(파이프라인 arm은 문항당
  # hop별 다중 LLM 호출이라 실효 부하가 큼) — SDK 기본 지수백오프에 재시도 예산을 더 줘서 흡수
  upstage: {model: solar-pro,    base_url: "https://api.upstage.ai/v1"}   # OpenAI 호환
  naver:   {model: HCX-DASH-001, base_url: "https://clovastudio.stream.ntruss.com"}
  openai:  {model: gpt-4o-mini,  base_url: "https://api.openai.com/v1"}
embedding:                          # dim이 다르므로 제공자 바꾸면 인덱스 재생성 필요
  batch: 32                         # 요청당 문단 수. Upstage 한도 미확정 → 보수적 안전값 (ADR-11)
  max_chars: 5000                   # 입력당 절단 길이. solar 4000토큰 한도 방지 (ADR-11)
  upstage: {model: solar-embedding-1-large, dim: 4096, base_url: "https://api.upstage.ai/v1"}
  naver:   {model: bge-m3,                  dim: 1024}
  openai:  {model: text-embedding-3-small,  dim: 1536, base_url: "https://api.openai.com/v1"}
  # solar-embedding: 문서는 ...-passage, 질의는 ...-query 변형 사용 (embedder 어댑터에서 분기)
vector:
  backend: faiss                     # faiss | numpy (VectorIndexPort 뒤, 교체 자유). 3만 규모라 exact
  dir: data/index                    # faiss.index + ids.jsonl + vectors.npy(임베딩 캐시)
retrieval:
  top_k_paragraphs: 10               # Recall@10 계산 위해 ≥ max(k). LLM 후보추출도 이 상한 (C3)
  use_hyde_definition: true          # sub_query + expected.definition 결합 임베딩
grounding:
  theta_high: 0.90                   # 스냅 확정 (무보정값 — W1.2에서 relation 임베딩 실측 보정 필요)
  theta_low: 0.75                    # 미만이면 포기 + 힌트
verification:
  pass_ratio: 0.75                   # 시행 검사 통과 비율. 단 backlink="contradict"는 pass_ratio 무관 hard-veto (03 §0/C1)
  theta_desc: 0.60
  score_lambda: 0.3                  # 벡터 유사도 가중
execution:
  max_requery: 2
  max_depth: 3
  max_hops_total: 5
  tie_epsilon: 0.15                  # margin < ε → tie
  max_active_chains: 3
  memoize: true                      # [4] 검색결과만 캐시 (C6)
paths:
  corpus: data/corpus.jsonl
  chroma_dir: data/chroma
  graph_pickle: data/graph.pkl
  alias: data/alias.json
